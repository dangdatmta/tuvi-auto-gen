name: Ancient Wisdom Short Videos 1

on:
  workflow_dispatch:
    inputs:
      video_date:
        description: "YYYY-MM-DD seed date. Defaults to current Asia/Ho_Chi_Minh date."
        required: false
        type: string
      publish:
        description: "Publish to social platforms after rendering. Requires secrets."
        required: false
        default: false
        type: boolean
      run_slot:
        description: "Daily run slot: 1-8. Manual runs default from current Asia/Ho_Chi_Minh 3-hour block."
        required: false
        type: string
  schedule:
    # Every 3 hours in Asia/Ho_Chi_Minh: 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00.
    - cron: "0 17 * * *"
    - cron: "0 20 * * *"
    - cron: "0 23 * * *"
    - cron: "0 2 * * *"
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
    - cron: "0 11 * * *"
    - cron: "0 14 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve daily slot
        id: slot
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_VIDEO_DATE: ${{ inputs.video_date }}
          INPUT_RUN_SLOT: ${{ inputs.run_slot }}
        run: |
          set -euo pipefail

          VIDEO_DATE="$INPUT_VIDEO_DATE"
          if [ -z "$VIDEO_DATE" ]; then
            VIDEO_DATE="$(TZ=Asia/Ho_Chi_Minh date +%F)"
          fi

          RUN_SLOT="$INPUT_RUN_SLOT"
          if [ -z "$RUN_SLOT" ]; then
            if [ "$EVENT_NAME" = "schedule" ]; then
              case "$EVENT_SCHEDULE" in
                "0 17 * * *") RUN_SLOT="1" ;;
                "0 20 * * *") RUN_SLOT="2" ;;
                "0 23 * * *") RUN_SLOT="3" ;;
                "0 2 * * *") RUN_SLOT="4" ;;
                "0 5 * * *") RUN_SLOT="5" ;;
                "0 8 * * *") RUN_SLOT="6" ;;
                "0 11 * * *") RUN_SLOT="7" ;;
                "0 14 * * *") RUN_SLOT="8" ;;
                *)
                  echo "Unable to map scheduled cron to RUN_SLOT: $EVENT_SCHEDULE" >&2
                  exit 1
                  ;;
              esac
            else
              ICT_HOUR="$(TZ=Asia/Ho_Chi_Minh date +%H)"
              RUN_SLOT="$((10#$ICT_HOUR / 3 + 1))"
              if [ "$RUN_SLOT" -gt 8 ]; then
                RUN_SLOT="8"
              fi
            fi
          fi

          case "$RUN_SLOT" in
            1|2|3|4|5|6|7|8) ;;
            *)
              echo "RUN_SLOT must be 1-8. Received: $RUN_SLOT" >&2
              exit 1
              ;;
          esac

          echo "video_date=$VIDEO_DATE" >> "$GITHUB_OUTPUT"
          echo "run_slot=$RUN_SLOT" >> "$GITHUB_OUTPUT"
          echo "date_dir=daily/$VIDEO_DATE/slot-$RUN_SLOT" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python video packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install vieneu rembg pillow opencv-python-headless numpy

      - name: Generate daily project folders
        env:
          VIDEO_DATE: ${{ steps.slot.outputs.video_date }}
          RUN_SLOT: ${{ steps.slot.outputs.run_slot }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_TEXT_MODEL: ${{ secrets.GEMINI_TEXT_MODEL || 'gemini-2.5-flash' }}
          GEMINI_TEMPERATURE: ${{ secrets.GEMINI_TEMPERATURE || '0.8' }}
          GEMINI_MAX_RETRIES: ${{ secrets.GEMINI_MAX_RETRIES || '2' }}
          PYTHON_BIN: python
          VIENEU_VOICE: Tuyen
          ENABLE_SUBJECT_OUTLINE: "true"
          ENABLE_SUBJECT_LAYERS: "true"
          SUBJECT_MODEL: isnet-general-use
          SUBJECT_MIN_AREA_RATIO: "0.015"
          SUBJECT_LAYER_OPACITY: "0.92"
          SUBJECT_SHADOW_OPACITY: "0.38"
          SUBJECT_DEPTH_PUSH: "34"
        run: node automation/generate-daily-videos.mjs

      - name: Render generated video
        run: |
          set -euo pipefail
          DATE_DIR="${{ steps.slot.outputs.date_dir }}"
          mkdir -p "$DATE_DIR/renders"
          for dir in "$DATE_DIR"/*/; do
            [ -f "$dir/index.html" ] || continue
            echo "Rendering $dir"
            (cd "$dir" && npx --yes hyperframes@0.6.40 lint && npx --yes hyperframes@0.6.40 validate && npx --yes hyperframes@0.6.40 inspect --samples 12)
            (cd "$dir" && npx --yes hyperframes@0.6.40 render --output "../renders/$(basename "$dir").mp4" --quality standard --fps 24 --workers 1 --max-concurrent-renders 1 --video-bitrate 10M)
          done

      - name: Publish social videos
        env:
          VIDEO_DATE: ${{ steps.slot.outputs.video_date }}
          RUN_SLOT: ${{ steps.slot.outputs.run_slot }}
          ENABLE_SOCIAL_PUBLISH: ${{ secrets.ENABLE_SOCIAL_PUBLISH }}
          PUBLISH_DRY_RUN: ${{ secrets.PUBLISH_DRY_RUN }}
          PUBLISH_PLATFORMS: ${{ secrets.PUBLISH_PLATFORMS }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS }}
          YOUTUBE_CATEGORY_ID: ${{ secrets.YOUTUBE_CATEGORY_ID }}
          FACEBOOK_GRAPH_VERSION: ${{ secrets.FACEBOOK_GRAPH_VERSION }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: node automation/publish-social.mjs

      - name: Upload video artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ancient-wisdom-short-videos
          path: |
            daily/**/slot-*/renders/*.mp4
            daily/**/slot-*/manifest.json
            daily/**/slot-*/*/post.json
            daily/**/slot-*/*/*sources*.json
          retention-days: 14
